name: 'Get and cache dependency'
description: 'Get the dependecy (via npm) and cache them.'
runs:
  using: composite
  steps:
    - name: cache dep
      id: cache
      uses: actions/cache@v5.0.5
      with:
        path: node_modules
        key: deps-node-modules-{{ hashFiles('**/package-lock.json') }}
    - name: Install dependencies
      if: steps.cache.outputs.cache-hit != 'true'
      run: npm ci
      shell: bash

  