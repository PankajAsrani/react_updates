name: Reusable Deploy
on: 
  workflow_call:
    inputs: 
      artifact-name:
        description: The name of the artifact
        required: false
        default: dist
        type: string
    outputs:
      result:
        description: The result of teh deployment
        value: ${{ jobs.deploy.outputs.outcome }}
    secrets:
      some-secrets: 
        required: false
jobs:
  deploy:
    outputs:
      outcome: ${{ steps.set-result.outputs.step-result }}
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/download-artifact@v8.0.1
        with: 
          name: ${{ inputs.artifact-name }}
      - name: List files
        run: ls -l
      - name: Output Info
        run: echo "Deploying & uploading ${{ secrets.some-secrets}}"
      - name: set result output
        id: set-result
        run: echo "step-result=success" >> $GITHUB_OUTPUT 

      