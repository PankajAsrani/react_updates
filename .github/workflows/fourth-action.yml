name: Fourth Action
on:
  push:
    branches:
      - main
env:
  REACT_HEADING: My App
jobs:
  test:
    env:
      REACT_SUBHEADING: Subheading
    runs-on: ubuntu-latest
    steps:
      - name: Get Code
        uses: actions/checkout@v6
      - name: cache dep
        uses: actions/cache@v5.0.5
        with:
          path: ~/.npm
          key: deps-node-modules-{{ hashFiles('**/package-lock.json') }} #retriev cache in future
      - name: Install dependencies
        run: npm ci
      - name: Lint code
        run: npm run lint
      - name: Test code
        run: npm run test
  build:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      script-file: ${{ steps.publish.outputs.script-file }}
    steps:
      - name: Get Code
        uses: actions/checkout@v6
      - name: cache dep
        uses: actions/cache@v5.0.5
        with:
          path: ~/.npm
          key: deps-node-modules-{{ hashFiles('**/package-lock.json') }} #retriev cache in future
      - name: Install dependencies
        run: npm ci
      - name: Build app
        run: npm run build
      - name: Publish js filename
        id: publish
        run: find dist/assets/*.js -type f -execdir echo 'script-file={}' >> $GITHUB_OUTPUT ';'
      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: dist-files
          # path: |
          #   dist
          #   package.json
          path: dist
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Get build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: dist-files
      - name: Output Content
        run: ls
      - name: Output filename
        run: echo "${{ needs.build.outputs.script-file }}"
      - name: Deploy
        run: echo "Deploying... $REACT_HEADING ${{ env.REACT_HEADING}}"
